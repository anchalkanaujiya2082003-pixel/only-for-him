<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sorry ❤️</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    color:white;
    text-align:center;
    font-family: Arial;
}

h1{
    margin-top:120px;
    font-size:40px;
    color:#ff4d6d;
    text-shadow:0 0 20px #ff4d6d;
    animation: fadeIn 2s;
}

.name{
    font-size:25px;
    margin-top:20px;
    color:#fff;
    animation: fadeIn 3s;
}

.heart{
    position:absolute;
    font-size:30px;
    animation: float 4s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-400px);opacity:0;}
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<h1>❤️ I'M REALLY SORRY ❤️</h1>
<div class="name">Please forgive me 💌 (lets forget everything and start happily never ending life.)</div>

<script>
// hearts animation
window.onload = () => {
    document.body.addEventListener("click", () => {
        document.getElementById("music").play();
    });
};
setInterval(()=>{
    let heart=document.createElement("div");
    heart.innerHTML="❤️";
    heart.classList.add("heart");

    heart.style.left=Math.random()*window.innerWidth+"px";
    heart.style.top=window.innerHeight+"px";

    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),4000);
},200);
</script>

</body>
</html>
